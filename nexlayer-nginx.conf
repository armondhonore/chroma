server {
    listen 8000;
    server_name _;

    # Chroma has no handler at "/" (returns 404 by design) and the v1 API is
    # deprecated (410). Redirect the bare root to the Swagger UI ("/docs", 200)
    # so the routed public path resolves to a 3xx -> 2xx instead of a 404.
    location = / {
        return 302 /docs;
    }

    # Everything else is proxied straight through to the Chroma server, which
    # listens on the loopback port below.
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
